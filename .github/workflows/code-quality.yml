name: Code Quality
on:
  workflow_call:
    inputs:
      path:
        description: "Path to the Python files"
        required: true
        type: string
jobs:
  code-quality:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # https://github.com/actions/checkout/releases/tag/v6.0.2
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # https://github.com/Azure/setup-helm/releases/tag/v5.0.0
        with:
          version: "latest"
        id: install
      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # https://github.com/astral-sh/setup-uv/releases/tag/v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Get changed python files
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # https://github.com/tj-actions/changed-files/releases/tag/v47.0.5
        with:
          files: |
            ${{ inputs.path }}
      - name: Install dependencies
        run: uv sync --frozen --extra dev
      - name: Check black formatting
        run: uv run black --check --diff --config ./pyproject.toml .
      - name: Lint helm charts
        run: helm lint --strict ./charts/logprep
      - name: Lint changed and added files
        if: steps.changed-files.outputs.all_changed_files
        run: uv run pylint ${{ steps.changed-files.outputs.all_changed_files }}
      - name: mypy type checking
        if: steps.changed-files.outputs.all_changed_files
        run: uv run mypy ${{ steps.changed-files.outputs.all_changed_files }}
      - name: Run tests and collect coverage
        run: uv run pytest tests/unit --cov=logprep --cov-report=xml
      - name: Upload coverage reports to Codecov with GitHub Action
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # https://github.com/codecov/codecov-action/releases/tag/v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
